name: Publish a container image

on:
  push:
  release:
    types: [published, edited]

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set the SELENOID version from the tag 
        if: (github.event_name == 'release' && (github.event.action == 'published' || github.event.action == 'edited'))
        run: |-
          echo SELENOID_VERSION=${{ github.event.release.tag_name }} >> "$GITHUB_ENV"
      
      - name: Set the selenoid version from the tag 
        if: github.event_name == 'push'
        run: |-
          echo SELENOID_VERSION=${{ github.sha }} >> "$GITHUB_ENV"

      - name: Build an image
        id: build-image
        uses: redhat-actions/buildah-build@v2
        with:
          image: selenoid-dev
          tags: ${{ env.TAGS }}
          platforms: linux/amd64, linux/arm64/v8
          build-args: |
            SELENOID_VERSION=${{ env.SELENOID_VERSION }}
          containerfiles: |
            ./Containerfile
          labels: ${{ env.ANNOTATIONS }}

      - name: Push the image to GHCR
        id: push-to-ghcr
        uses: redhat-actions/push-to-registry@v2
        with:
          image: ${{ steps.build-image.outputs.image }}
          tags: ${{ steps.build-image.outputs.tags }}
          registry: ghcr.io/${{ github.repository_owner }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Set the version tag (only if released)
        id: retag-version
        if: (github.event_name == 'release' && (github.event.action == 'published' || github.event.action == 'edited'))
        run: |
          buildah tag \
          ${{ steps.build-image.outputs.image }}:v${{ github.sha }} \
          ghcr.io/${{ github.repository_owner }}/selenoid:latest
          buildah tag \
          ${{ steps.build-image.outputs.image }}:v${{ github.sha }} \
          ghcr.io/${{ github.repository_owner }}/selenoid:${{ github.event.release.tag_name }}

      - name: Push the release image to GHCR
        if: (github.event_name == 'release' && (github.event.action == 'published' || github.event.action == 'edited'))
        uses: redhat-actions/push-to-registry@v2
        with:
          tags: ghcr.io/${{ github.repository_owner }}/selenoid:latest ghcr.io/${{ github.repository_owner }}/selenoid:${{ github.event.release.tag_name }}
          username: ${{ github.actor }}
          password: ${{ github.token }}
